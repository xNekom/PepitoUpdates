name: Check Pepito Status

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  check-pepito-status:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Check Pepito Status
      run: |
        echo "Verificando estado de Pépito..."
        EDGE_FUNCTION_URL="${{ secrets.SUPABASE_EDGE_FUNCTION_URL }}"

        if [ -z "$EDGE_FUNCTION_URL" ]; then
          echo "Error: SUPABASE_EDGE_FUNCTION_URL no configurado"
          exit 1
        fi

        response=$(curl -s --max-time 30 -w "\n%{http_code}" \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
          "$EDGE_FUNCTION_URL")

        http_code=$(echo "$response" | tail -n1)
        body=$(echo "$response" | head -n -1)

        echo "Código: $http_code"

        if [ "$http_code" -eq 200 ]; then
          echo "Estado verificado exitosamente"
        else
          echo "Error al verificar estado"
          exit 1
        fi
